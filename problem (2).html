<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Problem — Conjecture Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
  <style>
    :root{--bg:#09090f;--bg3:#13121e;--bg4:#1a1828;--border:rgba(120,110,200,0.12);--border2:rgba(120,110,200,0.22);--purple:#7c6ef7;--purple2:#a99df8;--teal:#2dd4a0;--amber:#f5a623;--red:#f05454;--text:#ece9ff;--text2:#9892c0;--text3:#5c567a;--mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.28;}
    .above{position:relative;z-index:2;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 40px;height:62px;display:flex;align-items:center;justify-content:space-between;background:rgba(9,9,15,0.85);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);}
    .nav-logo{font-family:var(--display);font-size:19px;font-weight:700;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--purple);}
    .nav-right{display:flex;align-items:center;gap:10px;}
    .back-btn{font-size:13px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.2s;}
    .back-btn:hover{color:var(--text);}
    .nav-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,rgba(124,110,247,0.4),rgba(45,212,160,0.3));border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text);cursor:pointer;text-decoration:none;overflow:hidden;}
    .nav-av img{width:100%;height:100%;object-fit:cover;}
    .page{padding:82px 40px 60px;max-width:860px;margin:0 auto;}
    .breadcrumb{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text3);margin-bottom:22px;font-family:var(--mono);}
    .breadcrumb a{color:var(--text3);text-decoration:none;}
    .breadcrumb a:hover{color:var(--purple2);}
    .prob-card{background:var(--bg3);border:0.5px solid var(--border2);border-radius:18px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden;}
    .prob-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--teal));}
    .prob-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
    .pill{font-size:10px;padding:3px 10px;border-radius:100px;font-family:var(--mono);}
    .pill-p{background:rgba(124,110,247,0.1);color:var(--purple2);border:0.5px solid rgba(124,110,247,0.22);}
    .pill-r{background:rgba(240,84,84,0.08);color:var(--red);border:0.5px solid rgba(240,84,84,0.18);}
    .pill-t{background:rgba(45,212,160,0.08);color:var(--teal);border:0.5px solid rgba(45,212,160,0.18);}
    .pill-a{background:rgba(245,166,35,0.08);color:var(--amber);border:0.5px solid rgba(245,166,35,0.18);}
    .prob-title{font-family:var(--display);font-size:21px;font-weight:700;color:var(--text);margin-bottom:18px;line-height:1.3;letter-spacing:-.3px;}
    .math-block{background:var(--bg);border:0.5px solid var(--border);border-radius:11px;padding:20px 22px;font-family:var(--mono);font-size:14px;color:var(--text2);line-height:2;margin-bottom:18px;}
    .prob-actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:18px;border-top:0.5px solid var(--border);}
    .act-btn{display:flex;align-items:center;gap:5px;background:var(--bg);border:0.5px solid var(--border2);border-radius:7px;padding:7px 13px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.2s;font-family:var(--body);}
    .act-btn:hover{border-color:var(--purple);color:var(--purple2);}
    .act-btn.voted{background:rgba(124,110,247,0.1);border-color:var(--purple);color:var(--purple2);}
    .prob-author{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text3);}
    .av-xs{width:24px;height:24px;border-radius:50%;background:rgba(124,110,247,0.2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--purple2);}
    .replies-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .replies-title{font-family:var(--display);font-size:17px;font-weight:600;}
    .sort-sel{background:var(--bg3);border:0.5px solid var(--border);border-radius:7px;padding:5px 9px;font-size:12px;color:var(--text2);font-family:var(--mono);outline:none;cursor:pointer;}
    .reply{display:flex;gap:12px;margin-bottom:13px;}
    .reply-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
    .reply-card{flex:1;background:var(--bg3);border:0.5px solid var(--border);border-radius:13px;padding:16px 18px;transition:border-color 0.2s;}
    .reply-card:hover{border-color:var(--border2);}
    .reply-card.best{border-color:rgba(45,212,160,0.35);background:rgba(45,212,160,0.02);}
    .reply-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
    .reply-name{font-size:13px;font-weight:500;color:var(--text);}
    .reply-time{font-size:11px;color:var(--text3);font-family:var(--mono);}
    .best-badge{font-size:10px;padding:2px 8px;border-radius:100px;background:rgba(45,212,160,0.1);color:var(--teal);border:0.5px solid rgba(45,212,160,0.2);}
    .reply-body{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:10px;}
    .reply-footer{display:flex;gap:7px;}
    .r-btn{display:flex;align-items:center;gap:4px;background:transparent;border:none;font-size:12px;color:var(--text3);cursor:pointer;padding:3px 7px;border-radius:5px;transition:all 0.2s;font-family:var(--body);}
    .r-btn:hover{background:var(--bg4);color:var(--text2);}
    .r-btn.voted{color:var(--purple2);}
    .reply-box{background:var(--bg3);border:0.5px solid var(--border2);border-radius:15px;padding:18px;margin-top:22px;}
    .rb-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
    .latex-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
    .lt-btn{background:var(--bg);border:0.5px solid var(--border);border-radius:5px;padding:4px 8px;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--mono);transition:all 0.2s;}
    .lt-btn:hover{border-color:var(--border2);color:var(--purple2);}
    textarea{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:9px;padding:12px;font-size:13px;color:var(--text);font-family:var(--mono);resize:vertical;min-height:100px;outline:none;transition:border-color 0.2s;line-height:1.6;}
    textarea:focus{border-color:var(--purple);}
    textarea::placeholder{color:var(--text3);}
    .rb-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:8px;}
    .rb-tip{font-size:11px;color:var(--text3);font-family:var(--mono);}
    .rb-tip code{color:var(--purple2);}
    .post-reply-btn{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-family:var(--body);font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
    .post-reply-btn:hover{background:#8f82f9;}
    .post-reply-btn:disabled{opacity:0.6;cursor:not-allowed;}
    .login-prompt{background:rgba(124,110,247,0.06);border:0.5px solid rgba(124,110,247,0.18);border-radius:11px;padding:16px 20px;text-align:center;font-size:14px;color:var(--text2);}
    .login-prompt a{color:var(--purple2);text-decoration:none;font-weight:500;}
    .not-found{text-align:center;padding:80px 20px;color:var(--text2);}
    .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
    .spinner-lg{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite;margin:40px auto;display:block;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:640px){.page{padding:75px 16px 40px;}.prob-title{font-size:18px;}}
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<nav>
  <a href="index.html" class="nav-logo"><span>C</span>onjecture Hub</a>
  <div class="nav-right">
    <a href="discussions.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Discussions</a>
    <a href="profile.html" class="nav-av" id="nav-av" style="display:none"></a>
  </div>
</nav>

<div class="page above" id="pageContent">
  <div class="spinner-lg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAtawy8WOVQODnj06DT6UecS3RLgsD5vYc",
  authDomain:"conjecture-hub.firebaseapp.com",
  projectId:"conjecture-hub",
  storageBucket:"conjecture-hub.firebasestorage.app",
  messagingSenderId:"50971221247",
  appId:"1:50971221247:web:fea10788f0efdc9279c0ca"
});
const auth=firebase.auth();
const db=firebase.firestore();
const problemId=new URLSearchParams(window.location.search).get('id');
let currentUser=null;

auth.onAuthStateChanged(u=>{
  currentUser=u;
  const nav=document.getElementById('nav-av');
  if(u){
    nav.style.display='flex';
    const init=(u.displayName||u.email||'U').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    nav.innerHTML=u.photoURL?`<img src="${u.photoURL}" alt="av"/>`:`${init}`;
  }
});

function timeAgo(ts){
  if(!ts) return 'just now';
  const s=Math.floor((Date.now()-ts.toMillis())/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function avColors(name){
  const n=(name||'?').charCodeAt(0)%6;
  const c=[['rgba(124,110,247,0.2)','#a99df8'],['rgba(45,212,160,0.15)','#2dd4a0'],['rgba(245,166,35,0.12)','#f5a623'],['rgba(240,84,84,0.1)','#f05454'],['rgba(127,119,221,0.15)','#7f77dd'],['rgba(45,180,212,0.12)','#2db4d4']];
  return c[n];
}
function renderMath(el){
  try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}catch(e){}
}

if(!problemId){
  document.getElementById('pageContent').innerHTML='<div class="not-found"><i class="fa-solid fa-circle-exclamation" style="font-size:32px;color:var(--red);margin-bottom:12px;display:block"></i>Problem not found.<br><a href="discussions.html" style="color:var(--purple2)">Back to discussions</a></div>';
}else{
  // Load problem
  db.collection('problems').doc(problemId).get().then(doc=>{
    if(!doc.exists){
      document.getElementById('pageContent').innerHTML='<div class="not-found">Problem not found.<br><a href="discussions.html" style="color:var(--purple2)">Back to discussions</a></div>';
      return;
    }
    const d=doc.data();
    document.title=`${d.title||'Problem'} — Conjecture Hub`;
    const pillClass={'Number Theory':'pill-p','Geometry':'pill-t','Algebra':'pill-r','Combinatorics':'pill-a','Analysis':'pill-t'}[d.topic]||'pill-p';
    const diffClass={'Beginner':'pill-t','Intermediate':'pill-a','Advanced':'pill-r','Elite':'pill-r'}[d.difficulty]||'pill-r';
    const authorInit=(d.authorName||'?').substring(0,2).toUpperCase();
    const [avBg,avColor]=avColors(d.authorName);
    document.getElementById('pageContent').innerHTML=`
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <i class="fa-solid fa-chevron-right" style="font-size:8px"></i>
        <a href="discussions.html">Discussions</a>
        <i class="fa-solid fa-chevron-right" style="font-size:8px"></i>
        <span style="color:var(--text2)">${escHtml(d.topic||'General')}</span>
      </div>
      <div class="prob-card" id="probCard">
        <div class="prob-meta">
          ${d.topic?`<span class="pill ${pillClass}">${escHtml(d.topic)}</span>`:''}
          ${d.difficulty?`<span class="pill ${diffClass}">${escHtml(d.difficulty)}</span>`:''}
          ${d.source?`<span class="pill pill-t">${escHtml(d.source)}</span>`:''}
        </div>
        <div class="prob-title">${escHtml(d.title)}</div>
        <div class="math-block" id="probBody">${escHtml(d.body)}</div>
        <div class="prob-actions">
          <button class="act-btn" id="upvoteBtn" onclick="upvoteProblem()">
            <i class="fa-solid fa-arrow-up"></i> <span id="upvoteCount">${d.upvotes||0}</span>
          </button>
          <button class="act-btn" onclick="document.getElementById('replyInput').focus()"><i class="fa-regular fa-comment"></i> Reply</button>
          <button class="act-btn" onclick="copyLink()"><i class="fa-solid fa-share-nodes"></i> Share</button>
          <div class="prob-author"><div class="av-xs" style="background:${avBg};color:${avColor}">${authorInit}</div> ${escHtml(d.authorName||'Anonymous')} · ${timeAgo(d.createdAt)}</div>
        </div>
      </div>
      <div class="replies-hd">
        <div class="replies-title" id="repliesTitle">Replies</div>
        <select class="sort-sel" id="sortSel" onchange="loadReplies()">
          <option value="upvotes">Best first</option>
          <option value="createdAt">Newest first</option>
        </select>
      </div>
      <div id="repliesList"></div>
      <div id="replyBox"></div>`;
    // render math
    const body=document.getElementById('probBody');
    body.textContent=d.body;
    renderMath(body);
    // check upvote state
    auth.onAuthStateChanged(u=>{
      if(u&&(d.upvotedBy||[]).includes(u.uid)){
        document.getElementById('upvoteBtn').classList.add('voted');
      }
      renderReplyBox(u);
    });
    loadReplies();
  }).catch(e=>console.error(e));
}

let repliesUnsub=null;
function loadReplies(){
  if(repliesUnsub) repliesUnsub();
  const sort=document.getElementById('sortSel')?.value||'upvotes';
  repliesUnsub=db.collection('problems').doc(problemId).collection('replies')
    .orderBy(sort,'desc')
    .onSnapshot(snap=>{
      const count=snap.size;
      const t=document.getElementById('repliesTitle');
      if(t) t.textContent=`${count} ${count===1?'reply':'replies'}`;
      const list=document.getElementById('repliesList');
      if(!list) return;
      if(snap.empty){list.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3);font-family:var(--mono);font-size:13px">No replies yet — be the first to contribute!</div>';return;}
      list.innerHTML=snap.docs.map(doc=>{
        const r=doc.data();
        const init=(r.authorName||'?').substring(0,2).toUpperCase();
        const [bg,col]=avColors(r.authorName);
        const isBest=r.isBest||false;
        const voted=currentUser&&(r.upvotedBy||[]).includes(currentUser.uid);
        return `<div class="reply" id="reply-${doc.id}">
          <div class="reply-av" style="background:${bg};color:${col}">${init}</div>
          <div class="reply-card${isBest?' best':''}">
            <div class="reply-top">
              <div><span class="reply-name">${escHtml(r.authorName||'Anonymous')}</span> <span class="reply-time" style="margin-left:7px">${timeAgo(r.createdAt)}</span></div>
              <div style="display:flex;align-items:center;gap:7px">
                ${isBest?'<span class="best-badge">✓ Best answer</span>':''}
              </div>
            </div>
            <div class="reply-body" id="rb-${doc.id}">${escHtml(r.body)}</div>
            <div class="reply-footer">
              <button class="r-btn${voted?' voted':''}" onclick="upvoteReply('${doc.id}')"><i class="fa-solid fa-arrow-up"></i> ${r.upvotes||0}</button>
              <button class="r-btn" onclick="document.getElementById('replyInput').value='@${escHtml(r.authorName)} ';document.getElementById('replyInput').focus()"><i class="fa-regular fa-comment"></i> Reply</button>
              ${currentUser&&currentUser.uid===d_authorId?`<button class="r-btn" onclick="markBest('${doc.id}',${!isBest})"><i class="fa-solid fa-check"></i> ${isBest?'Unmark':'Mark best'}</button>`:''}
            </div>
          </div>
        </div>`;
      }).join('');
      // render math in all replies
      snap.docs.forEach(doc=>{
        const el=document.getElementById('rb-'+doc.id);
        if(el){el.textContent=doc.data().body;renderMath(el);}
      });
    });
}

let d_authorId='';
db.collection('problems').doc(problemId).get().then(doc=>{if(doc.exists) d_authorId=doc.data().authorId;}).catch(()=>{});

function renderReplyBox(user){
  const box=document.getElementById('replyBox');
  if(!box) return;
  if(!user){
    box.innerHTML=`<div class="login-prompt">Want to join the discussion? <a href="login.html">Log in</a> or <a href="login.html">sign up</a> for free.</div>`;
    return;
  }
  const init=(user.displayName||user.email||'U').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  box.innerHTML=`
    <div class="reply-box">
      <div class="rb-title"><div class="reply-av" style="background:rgba(124,110,247,0.2);color:var(--purple2);width:28px;height:28px;font-size:10px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">${init}</div> Add your reply</div>
      <div class="latex-bar">
        <button class="lt-btn" onclick="ins('$$\n\n$$')">Display</button>
        <button class="lt-btn" onclick="ins('$\\\\frac{}{}$')">frac</button>
        <button class="lt-btn" onclick="ins('$\\\\sum_{i=1}^{n}$')">∑</button>
        <button class="lt-btn" onclick="ins('$\\\\sqrt{}$')">√</button>
        <button class="lt-btn" onclick="ins('$\\\\leq$')">≤</button>
        <button class="lt-btn" onclick="ins('$\\\\geq$')">≥</button>
        <button class="lt-btn" onclick="ins('$\\\\infty$')">∞</button>
        <button class="lt-btn" onclick="ins('$\\\\forall$')">∀</button>
        <button class="lt-btn" onclick="ins('$\\\\exists$')">∃</button>
        <button class="lt-btn" onclick="ins('$\\\\implies$')">⟹</button>
      </div>
      <textarea id="replyInput" placeholder="Write your solution, approach, or comment... Use $...$ for math"></textarea>
      <div class="rb-footer">
        <div class="rb-tip">Use <code>$x^2$</code> for inline and <code>$$...$$</code> for display math</div>
        <button class="post-reply-btn" id="postReplyBtn" onclick="postReply()"><i class="fa-solid fa-paper-plane"></i> Post reply</button>
      </div>
    </div>`;
}

function ins(str){
  const ta=document.getElementById('replyInput');
  if(!ta) return;
  const s=ta.selectionStart;
  ta.value=ta.value.slice(0,s)+str+ta.value.slice(s);
  ta.focus();ta.selectionStart=ta.selectionEnd=s+str.length;
}

async function postReply(){
  if(!currentUser){window.location.href='login.html';return;}
  const ta=document.getElementById('replyInput');
  const text=ta.value.trim();
  if(!text) return;
  const btn=document.getElementById('postReplyBtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  try{
    await db.collection('problems').doc(problemId).collection('replies').add({
      body:text,
      authorId:currentUser.uid,
      authorName:currentUser.displayName||currentUser.email||'Anonymous',
      upvotes:0,upvotedBy:[],isBest:false,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection('problems').doc(problemId).update({replyCount:firebase.firestore.FieldValue.increment(1)});
    await db.collection('users').doc(currentUser.uid).update({reputation:firebase.firestore.FieldValue.increment(5)}).catch(()=>{});
    ta.value='';
    btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Post reply';
  }catch(e){
    console.error(e);
    btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Post reply';
  }
}

async function upvoteProblem(){
  if(!currentUser){window.location.href='login.html';return;}
  const ref=db.collection('problems').doc(problemId);
  const doc=await ref.get();
  const data=doc.data();
  const voted=(data.upvotedBy||[]).includes(currentUser.uid);
  await ref.update({
    upvotes:firebase.firestore.FieldValue.increment(voted?-1:1),
    upvotedBy:voted?firebase.firestore.FieldValue.arrayRemove(currentUser.uid):firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
  });
  const btn=document.getElementById('upvoteBtn');
  const cnt=document.getElementById('upvoteCount');
  if(voted){btn.classList.remove('voted');cnt.textContent=parseInt(cnt.textContent)-1;}
  else{btn.classList.add('voted');cnt.textContent=parseInt(cnt.textContent)+1;}
}

async function upvoteReply(replyId){
  if(!currentUser){window.location.href='login.html';return;}
  const ref=db.collection('problems').doc(problemId).collection('replies').doc(replyId);
  const doc=await ref.get();
  const data=doc.data();
  const voted=(data.upvotedBy||[]).includes(currentUser.uid);
  await ref.update({
    upvotes:firebase.firestore.FieldValue.increment(voted?-1:1),
    upvotedBy:voted?firebase.firestore.FieldValue.arrayRemove(currentUser.uid):firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
  });
}

async function markBest(replyId,isBest){
  await db.collection('problems').doc(problemId).collection('replies').doc(replyId).update({isBest});
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn=event.target.closest('.act-btn');
    const orig=btn.innerHTML;
    btn.innerHTML='<i class="fa-solid fa-check"></i> Copied!';
    setTimeout(()=>btn.innerHTML=orig,2000);
  });
}

// Canvas bg
const cv=document.getElementById('bgCanvas');const cx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}resize();window.addEventListener('resize',resize);
const syms=['∑','∫','π','∞','α','β','θ','λ','Δ','ℝ','⟹','∀'];
const ps=Array.from({length:25},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,s:syms[Math.floor(Math.random()*syms.length)],sz:9+Math.random()*10,sp:.1+Math.random()*.18,op:.022+Math.random()*.05,dr:(Math.random()-.5)*.11}));
function draw(){cx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{cx.font=`${p.sz}px JetBrains Mono,monospace`;cx.fillStyle=`rgba(124,110,247,${p.op})`;cx.fillText(p.s,p.x,p.y);p.y-=p.sp;p.x+=p.dr;if(p.y<-20){p.y=cv.height+20;p.x=Math.random()*cv.width;p.s=syms[Math.floor(Math.random()*syms.length)];}});requestAnimationFrame(draw);}
draw();
</script>
