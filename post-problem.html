<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post a Problem — Conjecture Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
  <style>
    :root{--bg:#09090f;--bg3:#13121e;--bg4:#1a1828;--border:rgba(120,110,200,0.12);--border2:rgba(120,110,200,0.25);--purple:#7c6ef7;--purple2:#a99df8;--teal:#2dd4a0;--red:#f05454;--text:#ece9ff;--text2:#9892c0;--text3:#5c567a;--mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.3;}
    .above{position:relative;z-index:2;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 40px;height:62px;display:flex;align-items:center;justify-content:space-between;background:rgba(9,9,15,0.85);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);}
    .nav-logo{font-family:var(--display);font-size:19px;font-weight:700;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--purple);}
    .back-btn{font-size:13px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.2s;}
    .back-btn:hover{color:var(--text);}
    .page{padding:82px 40px 60px;max-width:760px;margin:0 auto;}
    .page-title{font-family:var(--display);font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px;}
    .page-sub{font-size:14px;color:var(--text2);margin-bottom:32px;}
    .form-card{background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:28px;position:relative;overflow:hidden;}
    .form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--teal));}
    .field{margin-bottom:20px;}
    .field-label{display:block;font-size:12px;color:var(--text2);margin-bottom:7px;font-family:var(--mono);letter-spacing:0.3px;display:flex;align-items:center;gap:6px;}
    .required{color:var(--red);font-size:10px;}
    input[type=text],textarea,select.field-select{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text);font-family:var(--body);outline:none;transition:border-color 0.2s;}
    input[type=text]:focus,textarea:focus,select.field-select:focus{border-color:var(--purple);}
    input::placeholder,textarea::placeholder{color:var(--text3);}
    textarea{resize:vertical;min-height:130px;font-family:var(--mono);line-height:1.6;}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:600px){.two-col{grid-template-columns:1fr;}}
    .latex-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
    .lt-btn{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;padding:4px 9px;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--mono);transition:all 0.2s;}
    .lt-btn:hover{border-color:var(--border2);color:var(--purple2);}
    .preview-box{background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:16px;margin-top:8px;font-size:14px;color:var(--text2);line-height:1.8;min-height:60px;font-family:var(--mono);}
    .preview-label{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:6px;letter-spacing:0.3px;}
    .char-count{font-size:11px;color:var(--text3);font-family:var(--mono);text-align:right;margin-top:4px;}
    .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:0.5px solid var(--border);}
    .cancel-btn{background:transparent;color:var(--text2);border:0.5px solid var(--border2);border-radius:9px;padding:10px 20px;font-size:14px;font-family:var(--body);cursor:pointer;transition:all 0.2s;}
    .cancel-btn:hover{border-color:var(--border2);color:var(--text);}
    .post-btn{background:var(--purple);color:#fff;border:none;border-radius:9px;padding:10px 24px;font-size:14px;font-family:var(--body);font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
    .post-btn:hover{background:#8f82f9;transform:translateY(-1px);}
    .post-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
    .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{background:rgba(240,84,84,0.1);border:0.5px solid rgba(240,84,84,0.3);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}
    .tip-box{background:rgba(124,110,247,0.06);border:0.5px solid rgba(124,110,247,0.18);border-radius:10px;padding:14px 16px;margin-bottom:24px;font-size:13px;color:var(--text2);line-height:1.6;}
    .tip-box code{color:var(--purple2);font-family:var(--mono);font-size:12px;}
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<nav>
  <a href="index.html" class="nav-logo"><span>C</span>onjecture Hub</a>
  <a href="discussions.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Discussions</a>
</nav>

<div class="page above">
  <div class="page-title">Post a Problem</div>
  <div class="page-sub">Share a math problem with the community — from beginner to olympiad level</div>

  <div class="tip-box">
    <strong style="color:var(--purple2)">LaTeX supported!</strong> Use <code>$...$</code> for inline math and <code>$$...$$</code> for display math. Example: <code>$\frac{a}{b}$</code> renders as a fraction.
  </div>

  <div class="form-card">
    <div id="error-msg" class="error-msg"></div>

    <div class="field">
      <label class="field-label">Problem title <span class="required">required</span></label>
      <input type="text" id="title" placeholder="e.g. Prove that for all primes p > 3, p² + 2 is never prime" maxlength="200"/>
    </div>

    <div class="field">
      <label class="field-label">Problem statement <span class="required">required</span></label>
      <div class="latex-bar">
        <button class="lt-btn" onclick="ins('$$\n\n$$')">Display math</button>
        <button class="lt-btn" onclick="ins('$\\frac{}{}$')">frac</button>
        <button class="lt-btn" onclick="ins('$\\sum_{i=1}^{n}$')">∑</button>
        <button class="lt-btn" onclick="ins('$\\sqrt{}$')">√</button>
        <button class="lt-btn" onclick="ins('$\\leq$')">≤</button>
        <button class="lt-btn" onclick="ins('$\\geq$')">≥</button>
        <button class="lt-btn" onclick="ins('$\\infty$')">∞</button>
        <button class="lt-btn" onclick="ins('$\\forall$')">∀</button>
        <button class="lt-btn" onclick="ins('$\\exists$')">∃</button>
        <button class="lt-btn" onclick="ins('$\\in$')">∈</button>
        <button class="lt-btn" onclick="ins('$\\implies$')">⟹</button>
        <button class="lt-btn" onclick="ins('$\\mathbb{R}$')">ℝ</button>
      </div>
      <textarea id="body" placeholder="Write the full problem statement here. Use $...$ for math." oninput="updatePreview();updateCount()" onkeyup="updatePreview()"></textarea>
      <div class="char-count"><span id="charCount">0</span>/2000</div>
      <div class="preview-label" style="margin-top:12px">Preview:</div>
      <div class="preview-box" id="preview">Your problem will appear here...</div>
    </div>

    <div class="two-col">
      <div class="field">
        <label class="field-label">Topic <span class="required">required</span></label>
        <select id="topic" class="field-select">
          <option value="">Select a topic...</option>
          <option>Number Theory</option>
          <option>Geometry</option>
          <option>Algebra</option>
          <option>Combinatorics</option>
          <option>Analysis</option>
          <option>Logic</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Difficulty</label>
        <select id="difficulty" class="field-select">
          <option value="">Select difficulty...</option>
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
          <option>Elite</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Source (optional)</label>
      <input type="text" id="source" placeholder="e.g. IMO 2023 P2, IOQM 2024, Original"/>
    </div>

    <div class="actions">
      <button class="cancel-btn" onclick="window.location.href='discussions.html'">Cancel</button>
      <button class="post-btn" id="postBtn" onclick="submitProblem()"><i class="fa-solid fa-paper-plane"></i> Post problem</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAtawy8WOVQODnj06DT6UecS3RLgsD5vYc",
  authDomain:"conjecture-hub.firebaseapp.com",
  projectId:"conjecture-hub",
  storageBucket:"conjecture-hub.firebasestorage.app",
  messagingSenderId:"50971221247",
  appId:"1:50971221247:web:fea10788f0efdc9279c0ca"
});
const auth=firebase.auth();
const db=firebase.firestore();
let currentUser=null;

auth.onAuthStateChanged(u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
});

function ins(str){
  const ta=document.getElementById('body');
  const s=ta.selectionStart;
  ta.value=ta.value.slice(0,s)+str+ta.value.slice(s);
  ta.focus();ta.selectionStart=ta.selectionEnd=s+str.length;
  updatePreview();updateCount();
}

let previewTimer=null;
function updatePreview(){
  clearTimeout(previewTimer);
  previewTimer=setTimeout(()=>{
    const txt=document.getElementById('body').value||'Your problem will appear here...';
    const prev=document.getElementById('preview');
    prev.textContent=txt;
    try{renderMathInElement(prev,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}catch(e){}
  },300);
}

function updateCount(){
  const l=document.getElementById('body').value.length;
  document.getElementById('charCount').textContent=l;
  document.getElementById('charCount').style.color=l>1800?'var(--red)':'var(--text3)';
}

function showError(msg){const e=document.getElementById('error-msg');e.textContent=msg;e.style.display='block';window.scrollTo({top:0,behavior:'smooth'});}

async function submitProblem(){
  const title=document.getElementById('title').value.trim();
  const body=document.getElementById('body').value.trim();
  const topic=document.getElementById('topic').value;
  const difficulty=document.getElementById('difficulty').value;
  const source=document.getElementById('source').value.trim();
  if(!title){showError('Please add a title for the problem');return;}
  if(!body){showError('Please write the problem statement');return;}
  if(!topic){showError('Please select a topic');return;}
  if(body.length>2000){showError('Problem statement is too long (max 2000 chars)');return;}
  const btn=document.getElementById('postBtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Posting...';
  try{
    const ref=await db.collection('problems').add({
      title,body,topic,
      difficulty:difficulty||'',
      source:source||'',
      authorId:currentUser.uid,
      authorName:currentUser.displayName||currentUser.email||'Anonymous',
      authorHandle:(currentUser.displayName||'user').toLowerCase().replace(/\s+/g,'_'),
      upvotes:0,upvotedBy:[],replyCount:0,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    // give user reputation points
    await db.collection('users').doc(currentUser.uid).update({
      reputation:firebase.firestore.FieldValue.increment(10)
    }).catch(()=>{});
    window.location.href=`problem.html?id=${ref.id}`;
  }catch(e){
    showError('Failed to post: '+e.message);
    btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Post problem';
  }
}

// Canvas bg
const cv=document.getElementById('bgCanvas');const cx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}resize();window.addEventListener('resize',resize);
const syms=['∑','∫','π','∞','α','β','θ','λ','Δ','ℝ','⟹','∀'];
const ps=Array.from({length:28},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,s:syms[Math.floor(Math.random()*syms.length)],sz:9+Math.random()*11,sp:.1+Math.random()*.2,op:.025+Math.random()*.055,dr:(Math.random()-.5)*.12}));
function draw(){cx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{cx.font=`${p.sz}px JetBrains Mono,monospace`;cx.fillStyle=`rgba(124,110,247,${p.op})`;cx.fillText(p.s,p.x,p.y);p.y-=p.sp;p.x+=p.dr;if(p.y<-20){p.y=cv.height+20;p.x=Math.random()*cv.width;p.s=syms[Math.floor(Math.random()*syms.length)];}});requestAnimationFrame(draw);}
draw();
</script>
</body>
</html>
