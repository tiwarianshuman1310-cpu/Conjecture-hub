<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Conjecture Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--bg:#09090f;--bg2:#0f0e18;--bg3:#13121e;--bg4:#1a1828;--border:rgba(120,110,200,0.12);--border2:rgba(120,110,200,0.25);--purple:#7c6ef7;--purple2:#a99df8;--teal:#2dd4a0;--text:#ece9ff;--text2:#9892c0;--text3:#5c567a;--mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.5;}
    .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
    .orb1{width:500px;height:500px;background:rgba(124,110,247,0.07);top:-150px;left:-100px;}
    .orb2{width:400px;height:400px;background:rgba(45,212,160,0.05);bottom:0;right:-100px;}
    .card{position:relative;z-index:2;background:var(--bg3);border:0.5px solid var(--border2);border-radius:24px;padding:40px;width:100%;max-width:420px;margin:80px 20px 20px;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),transparent);border-radius:24px 24px 0 0;}
    .logo{text-align:center;margin-bottom:28px;font-family:var(--display);font-size:22px;font-weight:700;color:var(--text);text-decoration:none;display:block;}
    .logo span{color:var(--purple);}
    .tabs{display:flex;background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;}
    .tab{flex:1;padding:9px;text-align:center;font-size:14px;cursor:pointer;border-radius:9px;transition:all 0.2s;color:var(--text3);font-family:var(--body);}
    .tab.active{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2);}
    .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--bg4);color:var(--text);border:0.5px solid var(--border2);border-radius:10px;padding:12px;font-size:14px;font-family:var(--body);cursor:pointer;transition:all 0.2s;margin-bottom:20px;}
    .btn-google:hover{background:rgba(124,110,247,0.08);border-color:var(--purple);}
    .google-icon{width:18px;height:18px;}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .divider-line{flex:1;height:0.5px;background:var(--border);}
    .divider-text{font-size:11px;color:var(--text3);font-family:var(--mono);}
    .field{margin-bottom:16px;}
    label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-family:var(--mono);letter-spacing:0.3px;}
    input[type=text],input[type=email],input[type=password]{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);font-family:var(--body);transition:border-color 0.2s;outline:none;}
    input:focus{border-color:var(--purple);}
    input::placeholder{color:var(--text3);}
    .input-icon{position:relative;}
    .input-icon input{padding-right:40px;}
    .input-icon i{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;cursor:pointer;}
    .forgot{text-align:right;margin-top:-8px;margin-bottom:16px;}
    .forgot a{font-size:12px;color:var(--purple2);text-decoration:none;}
    .btn-submit{width:100%;background:var(--purple);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-family:var(--body);font-weight:500;cursor:pointer;transition:all 0.2s;margin-bottom:16px;}
    .btn-submit:hover{background:#8f82f9;transform:translateY(-1px);}
    .terms{font-size:11px;color:var(--text3);text-align:center;line-height:1.6;}
    .terms a{color:var(--purple2);text-decoration:none;}
    .bottom-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text2);}
    .bottom-link a{color:var(--purple2);text-decoration:none;}
    .name-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(9,9,15,0.7);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);}
    .nav-logo{font-family:var(--display);font-size:20px;font-weight:700;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--purple);}
    .back-link{font-size:13px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;}
    .back-link:hover{color:var(--text);}
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<canvas id="mathCanvas"></canvas>
<nav>
  <a href="index.html" class="nav-logo"><span>C</span>onjecture Hub</a>
  <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
</nav>
<div class="card">
  <a href="index.html" class="logo"><span>C</span>onjecture Hub</a>
  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Log in</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign up</div>
  </div>
  <div id="form-login">
    <button class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
    <div class="field"><label>Email address</label><input type="email" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><div class="input-icon"><input type="password" id="pw-login" placeholder="Enter your password"/><i class="fa-regular fa-eye" onclick="togglePw('pw-login',this)"></i></div></div>
    <div class="forgot"><a href="#">Forgot password?</a></div>
    <button class="btn-submit" onclick="window.location.href='discussions.html'">Log in</button>
    <div class="bottom-link">No account? <a href="#" onclick="switchTab('signup')">Sign up free</a></div>
  </div>
  <div id="form-signup" style="display:none">
    <button class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
    <div class="name-row">
      <div class="field"><label>First name</label><input type="text" placeholder="Anshuman"/></div>
      <div class="field"><label>Last name</label><input type="text" placeholder="Tiwari"/></div>
    </div>
    <div class="field"><label>Username</label><input type="text" placeholder="anshuman_math"/></div>
    <div class="field"><label>Email address</label><input type="email" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><div class="input-icon"><input type="password" id="pw-signup" placeholder="Min. 8 characters"/><i class="fa-regular fa-eye" onclick="togglePw('pw-signup',this)"></i></div></div>
    <button class="btn-submit" onclick="window.location.href='discussions.html'">Create account</button>
    <div class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></div>
    <div class="bottom-link" style="margin-top:16px">Have an account? <a href="#" onclick="switchTab('login')">Log in</a></div>
  </div>
</div>
<script>
function switchTab(t){document.getElementById('tab-login').classList.toggle('active',t==='login');document.getElementById('tab-signup').classList.toggle('active',t==='signup');document.getElementById('form-login').style.display=t==='login'?'block':'none';document.getElementById('form-signup').style.display=t==='signup'?'block':'none';}
function togglePw(id,icon){const inp=document.getElementById(id);if(inp.type==='password'){inp.type='text';icon.classList.replace('fa-eye','fa-eye-slash');}else{inp.type='password';icon.classList.replace('fa-eye-slash','fa-eye');}}
const canvas=document.getElementById('mathCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
const syms=['∑','∫','√','π','∞','∂','α','β','γ','δ','θ','λ','φ','ω','Δ','Σ','ℝ','⟹','∀','∃','≠'];
const cols=['rgba(124,110,247,','rgba(169,157,248,','rgba(45,212,160,'];
const ps=Array.from({length:40},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,sym:syms[Math.floor(Math.random()*syms.length)],size:10+Math.random()*12,speed:0.15+Math.random()*0.3,op:0.04+Math.random()*0.09,col:cols[Math.floor(Math.random()*cols.length)],drift:(Math.random()-0.5)*0.18}));
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ps.forEach(p=>{ctx.font=`${p.size}px JetBrains Mono,monospace`;ctx.fillStyle=p.col+p.op+')';ctx.fillText(p.sym,p.x,p.y);p.y-=p.speed;p.x+=p.drift;if(p.y<-20){p.y=canvas.height+20;p.x=Math.random()*canvas.width;p.sym=syms[Math.floor(Math.random()*syms.length)];}});requestAnimationFrame(draw);}
draw();
</script>
</body>
</html>
