<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Conjecture Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--bg:#09090f;--bg3:#13121e;--bg4:#1a1828;--border:rgba(120,110,200,0.12);--border2:rgba(120,110,200,0.22);--purple:#7c6ef7;--purple2:#a99df8;--teal:#2dd4a0;--amber:#f5a623;--red:#f05454;--text:#ece9ff;--text2:#9892c0;--text3:#5c567a;--mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.28;}
    .above{position:relative;z-index:2;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 40px;height:62px;display:flex;align-items:center;justify-content:space-between;background:rgba(9,9,15,0.85);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);}
    .nav-logo{font-family:var(--display);font-size:19px;font-weight:700;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--purple);}
    .nav-right{display:flex;align-items:center;gap:10px;}
    .back-btn{font-size:13px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.2s;}
    .back-btn:hover{color:var(--text);}
    .logout-btn{background:none;border:0.5px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--body);transition:all 0.2s;}
    .logout-btn:hover{border-color:var(--border2);color:var(--text2);}
    .page{padding:82px 40px 60px;max-width:940px;margin:0 auto;}
    .spinner-lg{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite;margin:60px auto;display:block;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* PROFILE HEADER */
    .profile-header{background:var(--bg3);border:0.5px solid var(--border2);border-radius:22px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}
    .profile-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--teal));}
    .big-av{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,rgba(124,110,247,0.4),rgba(45,212,160,0.3));border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:26px;font-weight:700;color:var(--text);flex-shrink:0;overflow:hidden;}
    .big-av img{width:100%;height:100%;object-fit:cover;}
    .online-wrap{position:relative;flex-shrink:0;}
    .online-ring{position:absolute;bottom:2px;right:2px;width:13px;height:13px;border-radius:50%;background:var(--teal);border:2px solid var(--bg3);}
    .prof-name{font-family:var(--display);font-size:22px;font-weight:700;color:var(--text);margin-bottom:3px;letter-spacing:-.3px;}
    .prof-handle{font-family:var(--mono);font-size:12px;color:var(--text3);margin-bottom:10px;}
    .prof-bio{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:12px;max-width:460px;}
    .badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
    .badge{font-size:11px;padding:4px 10px;border-radius:100px;font-family:var(--mono);}
    .b-p{background:rgba(124,110,247,0.1);color:var(--purple2);border:0.5px solid rgba(124,110,247,0.22);}
    .b-t{background:rgba(45,212,160,0.08);color:var(--teal);border:0.5px solid rgba(45,212,160,0.18);}
    .b-a{background:rgba(245,166,35,0.08);color:var(--amber);border:0.5px solid rgba(245,166,35,0.18);}
    .b-r{background:rgba(240,84,84,0.08);color:var(--red);border:0.5px solid rgba(240,84,84,0.18);}
    .prof-loc{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;}
    .edit-btn{background:transparent;color:var(--text2);border:0.5px solid var(--border2);border-radius:8px;padding:8px 15px;font-size:13px;font-family:var(--body);cursor:pointer;transition:all 0.2s;margin-left:auto;}
    .edit-btn:hover{border-color:var(--purple);color:var(--purple2);}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
    @media(max-width:640px){.stats-row{grid-template-columns:repeat(2,1fr);}}
    .stat-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:13px;padding:16px;text-align:center;}
    .stat-num{font-family:var(--display);font-size:24px;font-weight:700;}
    .stat-label{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono);}

    /* CONTENT */
    .content-grid{display:grid;grid-template-columns:1fr 270px;gap:18px;align-items:start;}
    @media(max-width:800px){.content-grid{grid-template-columns:1fr;}}
    .tabs{display:flex;gap:0;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:3px;margin-bottom:18px;width:fit-content;}
    .tab{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;transition:all 0.2s;color:var(--text3);}
    .tab.active{background:var(--bg4);color:var(--text);border:0.5px solid var(--border2);}
    .activity-list{display:flex;flex-direction:column;gap:9px;}
    .act-item{background:var(--bg3);border:0.5px solid var(--border);border-radius:13px;padding:15px 17px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;color:inherit;}
    .act-item:hover{border-color:var(--border2);}
    .ai-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:7px;}
    .ai-title{font-size:14px;color:var(--text);font-weight:500;line-height:1.4;flex:1;}
    .ai-tag{font-size:10px;padding:2px 8px;border-radius:100px;font-family:var(--mono);white-space:nowrap;}
    .at-p{background:rgba(124,110,247,0.1);color:var(--purple2);border:0.5px solid rgba(124,110,247,0.2);}
    .at-t{background:rgba(45,212,160,0.08);color:var(--teal);border:0.5px solid rgba(45,212,160,0.18);}
    .at-r{background:rgba(240,84,84,0.08);color:var(--red);border:0.5px solid rgba(240,84,84,0.18);}
    .at-a{background:rgba(245,166,35,0.08);color:var(--amber);border:0.5px solid rgba(245,166,35,0.18);}
    .ai-meta{display:flex;gap:10px;font-size:11px;color:var(--text3);}
    .ai-meta span{display:flex;align-items:center;gap:4px;}
    .empty-msg{text-align:center;padding:40px;color:var(--text3);font-family:var(--mono);font-size:13px;}

    /* SIDEBAR */
    .side-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:13px;padding:17px;margin-bottom:13px;}
    .side-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
    .side-title i{color:var(--purple);font-size:12px;}
    .heatmap{display:grid;grid-template-columns:repeat(26,1fr);gap:2px;margin-bottom:7px;}
    .hm-cell{aspect-ratio:1;border-radius:2px;background:var(--bg4);}
    .hm-1{background:rgba(124,110,247,0.2);}
    .hm-2{background:rgba(124,110,247,0.4);}
    .hm-3{background:rgba(124,110,247,0.65);}
    .hm-4{background:rgba(124,110,247,0.9);}
    .hm-label{font-size:10px;color:var(--text3);font-family:var(--mono);}
    .skill-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
    .skill-lbl{font-size:12px;color:var(--text2);width:95px;flex-shrink:0;}
    .skill-bar{flex:1;height:3px;background:var(--bg4);border-radius:3px;overflow:hidden;}
    .skill-fill{height:100%;border-radius:3px;}
    .skill-pct{font-size:10px;color:var(--text3);font-family:var(--mono);width:28px;text-align:right;}
    .recent-badge-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:0.5px solid var(--border);}
    .recent-badge-item:last-child{border-bottom:none;}
    .rb-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;}
    .rb-name{font-size:12px;color:var(--text);font-weight:500;}
    .rb-desc{font-size:11px;color:var(--text3);}

    /* EDIT MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal{background:var(--bg3);border:0.5px solid var(--border2);border-radius:18px;padding:28px;width:100%;max-width:440px;position:relative;}
    .modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),transparent);border-radius:18px 18px 0 0;}
    .modal-title{font-family:var(--display);font-size:18px;font-weight:700;margin-bottom:20px;}
    .modal-field{margin-bottom:14px;}
    .modal-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-family:var(--mono);}
    .modal input,.modal textarea{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:9px;padding:10px 13px;font-size:14px;color:var(--text);font-family:var(--body);outline:none;transition:border-color 0.2s;}
    .modal input:focus,.modal textarea:focus{border-color:var(--purple);}
    .modal textarea{min-height:80px;resize:vertical;line-height:1.5;}
    .modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:20px;}
    .modal-cancel{background:transparent;color:var(--text2);border:0.5px solid var(--border2);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:var(--body);transition:all 0.2s;}
    .modal-cancel:hover{color:var(--text);}
    .modal-save{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-family:var(--body);font-weight:500;cursor:pointer;transition:all 0.2s;}
    .modal-save:hover{background:#8f82f9;}
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<nav>
  <a href="index.html" class="nav-logo"><span>C</span>onjecture Hub</a>
  <div class="nav-right">
    <a href="discussions.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Discussions</a>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="page above" id="pageContent">
  <div class="spinner-lg"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" style="display:none">
  <div class="modal">
    <div class="modal-title">Edit Profile</div>
    <div class="modal-field"><label class="modal-label">Display name</label><input type="text" id="edit-name" placeholder="Your name"/></div>
    <div class="modal-field"><label class="modal-label">Bio</label><textarea id="edit-bio" placeholder="Tell the community about yourself..."></textarea></div>
    <div class="modal-field"><label class="modal-label">Country</label><input type="text" id="edit-country" placeholder="e.g. India"/></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEdit()">Cancel</button>
      <button class="modal-save" onclick="saveProfile()">Save changes</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAtawy8WOVQODnj06DT6UecS3RLgsD5vYc",
  authDomain:"conjecture-hub.firebaseapp.com",
  projectId:"conjecture-hub",
  storageBucket:"conjecture-hub.firebasestorage.app",
  messagingSenderId:"50971221247",
  appId:"1:50971221247:web:fea10788f0efdc9279c0ca"
});
const auth=firebase.auth();
const db=firebase.firestore();
let currentUser=null, profileData={};

function logout(){auth.signOut().then(()=>window.location.href='index.html');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(ts){if(!ts)return 'recently';const s=Math.floor((Date.now()-ts.toMillis())/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
const tagMap={'Number Theory':'at-p','Geometry':'at-t','Algebra':'at-r','Combinatorics':'at-a','Analysis':'at-t'};

auth.onAuthStateChanged(async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  // get or create profile
  const ref=db.collection('users').doc(u.uid);
  let snap=await ref.get();
  if(!snap.exists){
    await ref.set({uid:u.uid,displayName:u.displayName||'Anonymous',email:u.email,bio:'',country:'',reputation:0,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    snap=await ref.get();
  }
  profileData=snap.data()||{};
  renderPage(u,profileData);
  loadActivity(u.uid);
});

function renderPage(user,p){
  const initials=(user.displayName||user.email||'U').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const isFounder=p.isFounder||false;
  document.getElementById('pageContent').innerHTML=`
    <div class="profile-header">
      <div class="online-wrap">
        <div class="big-av">${user.photoURL?`<img src="${user.photoURL}" alt="av"/>`:`${initials}`}</div>
        <div class="online-ring"></div>
      </div>
      <div style="flex:1">
        <div class="prof-name" id="disp-name">${escHtml(p.displayName||user.displayName||'Anonymous')}</div>
        <div class="prof-handle">@${escHtml((p.displayName||'user').toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''))} · Member since ${p.createdAt?new Date(p.createdAt.toMillis()).getFullYear():2025}</div>
        <div class="prof-bio" id="disp-bio">${escHtml(p.bio||'No bio yet. Click edit to add one.')}</div>
        <div class="badges" id="disp-badges">
          ${isFounder?'<span class="badge b-r">👑 Founder</span>':''}
          <span class="badge b-p">🏅 Member</span>
          ${(p.reputation||0)>=100?'<span class="badge b-t">⭐ Active</span>':''}
          ${(p.reputation||0)>=500?'<span class="badge b-a">🔥 Top contributor</span>':''}
        </div>
        <div class="prof-loc"><i class="fa-solid fa-location-dot" style="color:var(--purple2)"></i> ${escHtml(p.country||'Earth')} · ${escHtml(user.email||'')}</div>
      </div>
      <button class="edit-btn" onclick="openEdit()"><i class="fa-regular fa-pen-to-square"></i> Edit</button>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" style="color:var(--purple)">${p.reputation||0}</div><div class="stat-label">Reputation</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-problems" style="color:var(--teal)">—</div><div class="stat-label">Problems posted</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-replies" style="color:var(--amber)">—</div><div class="stat-label">Replies posted</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-upvotes">—</div><div class="stat-label">Upvotes received</div></div>
    </div>

    <div class="content-grid">
      <div>
        <div class="tabs">
          <div class="tab active" id="tab0" onclick="switchTab(0)">My Problems</div>
          <div class="tab" id="tab1" onclick="switchTab(1)">My Replies</div>
        </div>
        <div class="activity-list" id="activityList"><div class="empty-msg">Loading...</div></div>
      </div>
      <div>
        <div class="side-card">
          <div class="side-title"><i class="fa-solid fa-chart-simple"></i> Activity</div>
          <div class="heatmap" id="heatmap"></div>
          <div class="hm-label" style="margin-top:6px">Last 26 weeks</div>
        </div>
        <div class="side-card">
          <div class="side-title"><i class="fa-solid fa-brain"></i> Topic strengths</div>
          <div id="skills">Loading...</div>
        </div>
        <div class="side-card">
          <div class="side-title"><i class="fa-solid fa-medal"></i> Badges</div>
          <div class="recent-badge-item"><div class="rb-icon" style="background:rgba(124,110,247,0.12)">🏆</div><div><div class="rb-name">Member</div><div class="rb-desc">Joined Conjecture Hub</div></div></div>
          ${(p.reputation||0)>=100?'<div class="recent-badge-item"><div class="rb-icon" style="background:rgba(45,212,160,0.1)">⭐</div><div><div class="rb-name">Active</div><div class="rb-desc">100+ reputation</div></div></div>':''}
          ${(p.reputation||0)>=500?'<div class="recent-badge-item"><div class="rb-icon" style="background:rgba(245,166,35,0.1)">🔥</div><div><div class="rb-name">Top Contributor</div><div class="rb-desc">500+ reputation</div></div></div>':''}
          ${isFounder?'<div class="recent-badge-item"><div class="rb-icon" style="background:rgba(240,84,84,0.1)">👑</div><div><div class="rb-name">Founder</div><div class="rb-desc">Created Conjecture Hub</div></div></div>':''}
        </div>
      </div>
    </div>`;

  // heatmap
  const hm=document.getElementById('heatmap');
  for(let i=0;i<182;i++){const d=document.createElement('div');const v=Math.random();d.className='hm-cell'+(v>.85?' hm-4':v>.65?' hm-3':v>.45?' hm-2':v>.3?' hm-1':'');hm.appendChild(d);}

  // skills placeholder
  document.getElementById('skills').innerHTML=[
    ['Number Theory',88,'var(--purple)'],
    ['Algebra',72,'var(--teal)'],
    ['Combinatorics',61,'var(--amber)'],
    ['Geometry',54,'var(--purple2)'],
    ['Analysis',40,'var(--red)']
  ].map(([n,p,c])=>`<div class="skill-row"><div class="skill-lbl">${n}</div><div class="skill-bar"><div class="skill-fill" style="width:${p}%;background:${c}"></div></div><div class="skill-pct">${p}%</div></div>`).join('');
}

let currentTab=0;
let problems=[], replies=[];
async function loadActivity(uid){
  // load problems
  const pSnap=await db.collection('problems').where('authorId','==',uid).orderBy('createdAt','desc').limit(20).get();
  problems=pSnap.docs;
  document.getElementById('stat-problems').textContent=problems.length;
  const totalUpvotes=problems.reduce((s,d)=>s+(d.data().upvotes||0),0);
  document.getElementById('stat-upvotes').textContent=totalUpvotes;
  showProblems();
}

function showProblems(){
  const list=document.getElementById('activityList');
  if(!problems.length){list.innerHTML='<div class="empty-msg">No problems posted yet.<br><a href="post-problem.html" style="color:var(--purple2)">Post your first problem →</a></div>';return;}
  list.innerHTML=problems.map(doc=>{
    const d=doc.data();
    const tc=tagMap[d.topic]||'at-p';
    return `<a href="problem.html?id=${doc.id}" class="act-item">
      <div class="ai-top"><div class="ai-title">${escHtml(d.title)}</div><span class="ai-tag ${tc}">${escHtml(d.topic||'General')}</span></div>
      <div class="ai-meta">
        <span><i class="fa-solid fa-arrow-up"></i> ${d.upvotes||0}</span>
        <span><i class="fa-regular fa-comment"></i> ${d.replyCount||0}</span>
        <span><i class="fa-regular fa-clock"></i> ${timeAgo(d.createdAt)}</span>
      </div>
    </a>`;
  }).join('');
}

function switchTab(i){
  currentTab=i;
  document.getElementById('tab0').classList.toggle('active',i===0);
  document.getElementById('tab1').classList.toggle('active',i===1);
  if(i===0){showProblems();}
  else{
    const list=document.getElementById('activityList');
    list.innerHTML='<div class="empty-msg">Loading replies...</div>';
    db.collectionGroup('replies').where('authorId','==',currentUser.uid).orderBy('createdAt','desc').limit(20).get()
      .then(snap=>{
        document.getElementById('stat-replies').textContent=snap.size;
        if(snap.empty){list.innerHTML='<div class="empty-msg">No replies posted yet.</div>';return;}
        list.innerHTML=snap.docs.map(doc=>{
          const r=doc.data();
          const preview=r.body.replace(/\$[^$]*\$/g,'[math]').substring(0,100);
          return `<div class="act-item">
            <div class="ai-title" style="font-size:13px;margin-bottom:7px;color:var(--text2)">${escHtml(preview)}...</div>
            <div class="ai-meta">
              <span><i class="fa-solid fa-arrow-up"></i> ${r.upvotes||0}</span>
              <span>${r.isBest?'<i class="fa-solid fa-check-circle" style="color:var(--teal)"></i> Best answer':''}</span>
              <span><i class="fa-regular fa-clock"></i> ${timeAgo(r.createdAt)}</span>
            </div>
          </div>`;
        }).join('');
      }).catch(()=>{list.innerHTML='<div class="empty-msg">Could not load replies.</div>';});
  }
}

function openEdit(){
  document.getElementById('edit-name').value=profileData.displayName||currentUser.displayName||'';
  document.getElementById('edit-bio').value=profileData.bio||'';
  document.getElementById('edit-country').value=profileData.country||'';
  document.getElementById('editModal').style.display='flex';
}
function closeEdit(){document.getElementById('editModal').style.display='none';}

async function saveProfile(){
  const name=document.getElementById('edit-name').value.trim();
  const bio=document.getElementById('edit-bio').value.trim();
  const country=document.getElementById('edit-country').value.trim();
  try{
    await db.collection('users').doc(currentUser.uid).update({displayName:name||profileData.displayName,bio,country,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    if(name) await currentUser.updateProfile({displayName:name});
    profileData={...profileData,displayName:name,bio,country};
    if(document.getElementById('disp-name')) document.getElementById('disp-name').textContent=name||profileData.displayName;
    if(document.getElementById('disp-bio')) document.getElementById('disp-bio').textContent=bio||'No bio yet.';
    closeEdit();
  }catch(e){alert('Failed to save: '+e.message);}
}

// Canvas bg
const cv=document.getElementById('bgCanvas');const cx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}resize();window.addEventListener('resize',resize);
const syms=['∑','∫','π','∞','α','β','θ','λ','Δ','ℝ','⟹','∀'];
const ps=Array.from({length:25},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,s:syms[Math.floor(Math.random()*syms.length)],sz:9+Math.random()*10,sp:.1+Math.random()*.18,op:.02+Math.random()*.05,dr:(Math.random()-.5)*.11}));
function draw(){cx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{cx.font=`${p.sz}px JetBrains Mono,monospace`;cx.fillStyle=`rgba(124,110,247,${p.op})`;cx.fillText(p.s,p.x,p.y);p.y-=p.sp;p.x+=p.dr;if(p.y<-20){p.y=cv.height+20;p.x=Math.random()*cv.width;p.s=syms[Math.floor(Math.random()*syms.length)];}});requestAnimationFrame(draw);}
draw();
</script>
